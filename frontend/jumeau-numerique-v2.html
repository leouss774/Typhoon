<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Jumeau Numérique — Maison 3D</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #04070c; font-family: 'Segoe UI', system-ui, sans-serif; }
  #scene-container { width: 100vw; height: 100vh; display: block; cursor: grab; }

  /* ---- UI de test (Personne 3 remplacera tout ça par la vraie UI) ---- */
  #toggle-panel {
    position: absolute; top: 20px; left: 20px;

  #info-panel {

<script>
/* =========================================================================
   JUMEAU NUMÉRIQUE — MAISON 3D (style holographique / blueprint)
   -------------------------------------------------------------------------
   CONTRAT JSON (inchangé, voir doc d'équipe) :
   {
     score_global: number,
     zones: {
       fondations, murs_nord, murs_sud, murs_est, murs_ouest, toiture, sous_sol:
         { risque, niveau, alea_principal, justification, recommandations: [...] }
     },
     projection_2050: { score_global, zones: { ...même structure... } }
   }
   Le rendu est en 2 couches par zone :
   - un remplissage translucide coloré selon le risque (vert/orange/rouge)
   - un contour ("wireframe") bleu toujours constant, façon scan BIM
   Les éléments décoratifs (fenêtres, porte, garage) restent bleus fixes :
   ils ne font pas partie du contrat JSON et ne sont pas cliquables.
   ========================================================================= */

const MOCK_DATA = {
  score_global: 58,
  zones: {
    fondations: { risque: 78, niveau: "eleve", alea_principal: "Retrait-gonflement des argiles", justification: "Sol argileux identifié en zone d'aléa fort, aggravé par l'alternance sécheresse/humidité.", recommandations: [
      { travaux: "Renforcement des fondations par micropieux", cout_estime: "9000-16000€", gain_resilience: 30 },
      { travaux: "Drainage périphérique", cout_estime: "3000-6000€", gain_resilience: 15 }
    ]},
    murs_nord: { risque: 35, niveau: "modere", alea_principal: "Infiltration", justification: "Exposition nord avec humidité résiduelle plus fréquente.", recommandations: [
      { travaux: "Traitement hydrofuge de façade", cout_estime: "1500-3000€", gain_resilience: 12 }
    ]},
    murs_sud: { risque: 20, niveau: "faible", alea_principal: "Stress thermique", justification: "Exposition sud correcte, matériaux jugés stables.", recommandations: [] },
    murs_est: { risque: 28, niveau: "faible", alea_principal: "Vent", justification: "Exposition modérée aux vents dominants.", recommandations: [] },
    murs_ouest: { risque: 42, niveau: "modere", alea_principal: "Intempéries", justification: "Façade la plus exposée aux intempéries selon l'historique CATNAT local.", recommandations: [
      { travaux: "Renforcement bardage", cout_estime: "2000-4000€", gain_resilience: 10 }
    ]},
    toiture: { risque: 55, niveau: "modere", alea_principal: "Canicule / stress thermique", justification: "Isolation actuelle insuffisante face à l'augmentation prévue des épisodes caniculaires.", recommandations: [
      { travaux: "Isolation thermique renforcée", cout_estime: "6000-11000€", gain_resilience: 22 }
    ]},
    sous_sol: { risque: 65, niveau: "eleve", alea_principal: "Inondation / remontée de nappe", justification: "Proximité d'un cours d'eau avec historique d'inondation dans le secteur.", recommandations: [
      { travaux: "Pose de batardeaux et clapet anti-retour", cout_estime: "2500-5000€", gain_resilience: 20 }
    ]}
  },
  projection_2050: {
    score_global: 81,
    zones: {
      fondations: { risque: 92, niveau: "critique", alea_principal: "RGA aggravé", justification: "Sécheresses prolongées prévues en 2050, risque de fissuration majeure.", recommandations: [{ travaux: "Renforcement fondations + surveillance annuelle", cout_estime: "9000-16000€", gain_resilience: 35 }] },
      murs_nord:  { risque: 48, niveau: "modere", alea_principal: "Infiltration accrue", justification: "Augmentation des précipitations intenses en hiver.", recommandations: [{ travaux: "Traitement hydrofuge de façade", cout_estime: "1500-3000€", gain_resilience: 15 }] },
      murs_sud:   { risque: 40, niveau: "modere", alea_principal: "Stress thermique", justification: "Canicules plus longues, exposition sud plus sensible.", recommandations: [{ travaux: "Volets isolants", cout_estime: "1200-2500€", gain_resilience: 10 }] },
      murs_est:   { risque: 38, niveau: "modere", alea_principal: "Vent renforcé", justification: "Intensification des épisodes de vent fort.", recommandations: [] },
      murs_ouest: { risque: 60, niveau: "eleve", alea_principal: "Intempéries renforcées", justification: "Façade la plus exposée, aggravation attendue.", recommandations: [{ travaux: "Renforcement bardage renforcé", cout_estime: "2000-4000€", gain_resilience: 18 }] },
      toiture:    { risque: 80, niveau: "eleve", alea_principal: "Canicule prolongée", justification: "Périodes de canicule estimées à plusieurs mois en 2050.", recommandations: [{ travaux: "Isolation thermique renforcée + ventilation", cout_estime: "6000-11000€", gain_resilience: 30 }] },
      sous_sol:   { risque: 85, niveau: "critique", alea_principal: "Inondation aggravée", justification: "Augmentation de 30% des sinistres climatiques attendue d'ici 2050.", recommandations: [{ travaux: "Batardeaux + pompe de relevage", cout_estime: "3500-7000€", gain_resilience: 28 }] }
    }
  }
};

// ---------- 1. SCÈNE ----------
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070c);
scene.fog = new THREE.Fog(0x04070c, 18, 45);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// ---------- 2. LUMIÈRES (froides, façon scan technique) ----------
scene.add(new THREE.HemisphereLight(0x3a7bd5, 0x04070c, 0.7));
const rim = new THREE.DirectionalLight(0x4da6ff, 0.5);
rim.position.set(-8, 10, -6);
scene.add(rim);
const key = new THREE.DirectionalLight(0xbfe0ff, 0.4);
key.position.set(8, 12, 8);
scene.add(key);

// ---------- 3. SOL — grille bleue façon blueprint + anneau de scan ----------
const grid = new THREE.GridHelper(50, 50, 0x1560ff, 0x0d2647);
grid.material.transparent = true;
grid.material.opacity = 0.35;
scene.add(grid);

const ringGeo = new THREE.RingGeometry(5.6, 5.75, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
const scanRing = new THREE.Mesh(ringGeo, ringMat);
scanRing.rotation.x = -Math.PI / 2;
scanRing.position.y = 0.01;
scene.add(scanRing);

// ---------- 4. MATÉRIAUX RÉUTILISABLES ----------
const WIRE_COLOR = 0x5fb2ff;
function makeWireMat() { return new THREE.LineBasicMaterial({ color: WIRE_COLOR, transparent: true, opacity: 0.85 }); }
function makeFillMat(color, opacity) {
  return new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: opacity ?? 0.16,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
  });
}

/** Ajoute un mesh (fill translucide + contour bleu) à un groupe. Retourne le mesh de remplissage. */
function addPart(group, geometry, position, fillColor, opacity) {
  const fill = new THREE.Mesh(geometry, makeFillMat(fillColor, opacity));
  if (position) fill.position.copy(position);
  group.add(fill);

  const edges = new THREE.EdgesGeometry(geometry);
  const wire = new THREE.LineSegments(edges, makeWireMat());
  if (position) wire.position.copy(position);
  group.add(wire);

  return fill;
}

// ---------- 5. GÉOMÉTRIE DE LA MAISON (R+1, toit 2 pans, garage, sous-sol visible) ----------
const house = new THREE.Group();
scene.add(house);

const ZONE_NAMES = ["fondations", "murs_nord", "murs_sud", "murs_est", "murs_ouest", "toiture", "sous_sol"];
const zoneGroups = {};      // name -> THREE.Group
const zoneFillMeshes = {};  // name -> [Mesh, Mesh, ...]  (peut y avoir plusieurs volumes par zone : rez + étage)
const interactiveMeshes = []; // liste plate pour le raycasting

ZONE_NAMES.forEach(name => {
  const g = new THREE.Group();
  g.name = name;
  house.add(g);
  zoneGroups[name] = g;
  zoneFillMeshes[name] = [];
});

function registerFill(zoneName, fillMesh) {
  fillMesh.userData.zoneName = zoneName;
  zoneFillMeshes[zoneName].push(fillMesh);
  interactiveMeshes.push(fillMesh);
}

// Emprise du bâtiment principal
const W = 6.0, D = 5.0;         // largeur (X) x profondeur (Z)
const floorH = 1.35;             // demi-hauteur d'un niveau
const basementTopY = 0.4;
const fondY = basementTopY + 0.15;      // centre du bandeau de fondation
const rezY = 0.7 + floorH;               // centre des murs du rez-de-chaussée
const etageY = 0.7 + 2 * floorH + floorH; // centre des murs de l'étage
const eavesY = 0.7 + 4 * floorH;         // hauteur de l'égout de toit
const ridgeY = eavesY + 1.7;             // faîtage

// -- sous-sol (partiellement visible au-dessus du sol) --
registerFill("sous_sol", addPart(
  zoneGroups.sous_sol,
  new THREE.BoxGeometry(W + 0.3, 1.6, D + 0.3),
  new THREE.Vector3(0, -0.4, 0),
  0x3fb950, 0.18
));

// -- fondations (bandeau visible entre sous-sol et rez-de-chaussée) --
registerFill("fondations", addPart(
  zoneGroups.fondations,
  new THREE.BoxGeometry(W + 0.4, 0.3, D + 0.4),
  new THREE.Vector3(0, fondY, 0),
  0x3fb950, 0.18
));

// -- murs : chaque façade = 1 volume rez + 1 volume étage empilés --
const wallThickness = 0.2;

function buildWallZone(zoneName, sizeRez, sizeEtage, posRez, posEtage) {
  registerFill(zoneName, addPart(zoneGroups[zoneName], sizeRez, posRez, 0x3fb950, 0.16));
  registerFill(zoneName, addPart(zoneGroups[zoneName], sizeEtage, posEtage, 0x3fb950, 0.16));
}

buildWallZone("murs_nord",
  new THREE.BoxGeometry(W, 2 * floorH, wallThickness), new THREE.BoxGeometry(W, 2 * floorH, wallThickness),
  new THREE.Vector3(0, rezY, -D / 2), new THREE.Vector3(0, etageY, -D / 2)
);
buildWallZone("murs_sud",
  new THREE.BoxGeometry(W, 2 * floorH, wallThickness), new THREE.BoxGeometry(W, 2 * floorH, wallThickness),
  new THREE.Vector3(0, rezY, D / 2), new THREE.Vector3(0, etageY, D / 2)
);
buildWallZone("murs_est",
  new THREE.BoxGeometry(wallThickness, 2 * floorH, D), new THREE.BoxGeometry(wallThickness, 2 * floorH, D),
  new THREE.Vector3(W / 2, rezY, 0), new THREE.Vector3(W / 2, etageY, 0)
);
buildWallZone("murs_ouest",
  new THREE.BoxGeometry(wallThickness, 2 * floorH, D), new THREE.BoxGeometry(wallThickness, 2 * floorH, D),
  new THREE.Vector3(-W / 2, rezY, 0), new THREE.Vector3(-W / 2, etageY, 0)
);

// -- liseré de séparation rez/étage (décoratif, non cliquable) --
const bandGeo = new THREE.BoxGeometry(W + 0.15, 0.08, D + 0.15);
const bandFill = new THREE.Mesh(bandGeo, makeFillMat(0x5fb2ff, 0.25));
bandFill.position.set(0, 0.7 + 2 * floorH, 0);
house.add(bandFill);
house.add(new THREE.LineSegments(new THREE.EdgesGeometry(bandGeo), makeWireMat()).translateY ? (() => {
  const l = new THREE.LineSegments(new THREE.EdgesGeometry(bandGeo), makeWireMat());
  l.position.copy(bandFill.position);
  return l;
})() : null);

// -- toit à 2 pans (le plus courant), avec pignons triangulaires --
const roofHalfSpan = D / 2 + 0.35;                 // débord de toit
const roofSlopeLength = Math.sqrt(roofHalfSpan * roofHalfSpan + 1.7 * 1.7);
const roofAngle = Math.atan2(1.7, roofHalfSpan);

function makeRoofSlope(sign) {
  const geo = new THREE.BoxGeometry(W + 0.7, 0.12, roofSlopeLength);
  const mesh = new THREE.Mesh(geo, makeFillMat(0x3fb950, 0.16));
  mesh.rotation.x = sign * roofAngle;
  mesh.position.set(0, eavesY + 0.85, sign * (roofHalfSpan / 2) * Math.cos(roofAngle) * 0 + sign * (D / 4));
  // repositionne précisément : le pan va de l'égout (bord) au faîtage (centre)
  mesh.position.y = (eavesY + ridgeY) / 2;
  mesh.position.z = sign * (roofHalfSpan / 2) * Math.cos(0); // approximation suffisante visuellement
  zoneGroups.toiture.add(mesh);
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), makeWireMat());
  wire.rotation.copy(mesh.rotation);
  wire.position.copy(mesh.position);
  zoneGroups.toiture.add(wire);
  return mesh;
}
registerFill("toiture", makeRoofSlope(1));
registerFill("toiture", makeRoofSlope(-1));

// -- pignons triangulaires (nord/sud) --
function makeGableTriangle(zSide) {
  const geo = new THREE.BufferGeometry();
  const halfW = W / 2;
  const vertices = new Float32Array([
    -halfW, eavesY, zSide,
     halfW, eavesY, zSide,
     0,     ridgeY, zSide
  ]);
  geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, makeFillMat(0x3fb950, 0.16));
  zoneGroups.toiture.add(mesh);
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), makeWireMat());
  zoneGroups.toiture.add(wire);
  return mesh;
}
registerFill("toiture", makeGableTriangle(-D / 2));
registerFill("toiture", makeGableTriangle(D / 2));

// -- éléments décoratifs (bleus fixes, non cliquables) : fenêtres, porte, garage --
const decor = new THREE.Group();
house.add(decor);

function addDecorPanel(geometry, position, rotationY) {
  const fill = new THREE.Mesh(geometry, makeFillMat(0x5fb2ff, 0.22));
  fill.position.copy(position);
  if (rotationY) fill.rotation.y = rotationY;
  decor.add(fill);
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), makeWireMat());
  wire.position.copy(position);
  if (rotationY) wire.rotation.y = rotationY;
  decor.add(wire);
  return fill;
}

// fenêtres rez-de-chaussée (façade sud, la plus visible)
[-1.6, 1.6].forEach(x => {
  addDecorPanel(new THREE.BoxGeometry(0.9, 1.1, 0.06), new THREE.Vector3(x, rezY - 0.1, D / 2 + 0.02));
});
// fenêtres étage
[-1.6, 1.6].forEach(x => {
  addDecorPanel(new THREE.BoxGeometry(0.9, 1.0, 0.06), new THREE.Vector3(x, etageY, D / 2 + 0.02));
});
// porte d'entrée
addDecorPanel(new THREE.BoxGeometry(0.9, 1.9, 0.06), new THREE.Vector3(0, 0.7 + 0.95, D / 2 + 0.02));
// petites fenêtres du sous-sol (visible)
[-2.0, 2.0].forEach(x => {
  addDecorPanel(new THREE.BoxGeometry(0.6, 0.35, 0.06), new THREE.Vector3(x, 0.15, D / 2 + 0.16));
});

// -- garage accolé (côté ouest), décoratif --
const garageW = 3.0, garageD = 4.2, garageH = 2.4;
const garageX = -W / 2 - garageW / 2 - 0.05;
addDecorPanel(new THREE.BoxGeometry(garageW, garageH, garageD), new THREE.Vector3(garageX, 0.7 + garageH / 2, 0));
// toit mono-pente du garage
const garageRoofGeo = new THREE.BoxGeometry(garageW + 0.3, 0.1, garageD + 0.3);
const garageRoof = addDecorPanel(garageRoofGeo, new THREE.Vector3(garageX, 0.7 + garageH + 0.05, 0));
// porte de garage
addDecorPanel(new THREE.BoxGeometry(2.4, 1.9, 0.05), new THREE.Vector3(garageX, 0.7 + 0.95, D / 2));

// ---------- 6. MAPPING SCORE → COULEUR ----------
function scoreToColor(score) {
  if (score < 30) return 0x3fb950;
  if (score < 60) return 0xd29922;
  if (score < 80) return 0xdb6d28;
  return 0xda3633;
}

function animateColor(mesh, targetHex, duration = 600) {
  const mat = mesh.material;
  const startColor = mat.color.clone();
  const targetColor = new THREE.Color(targetHex);
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    mat.color.lerpColors(startColor, targetColor, eased);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateZoneColor(zoneName, score, animated = true) {
  const meshes = zoneFillMeshes[zoneName];
  if (!meshes || !meshes.length) { console.warn(`Zone inconnue: ${zoneName}`); return; }
  const color = scoreToColor(score);
  meshes.forEach(m => animated ? animateColor(m, color) : m.material.color.set(color));
  updateZoneLabel(zoneName, score);
}

function setZonesFromData(zonesObj) {
  if (!zonesObj) return;
  ZONE_NAMES.forEach(name => {
    if (zonesObj[name] && typeof zonesObj[name].risque === 'number') {
      updateZoneColor(name, zonesObj[name].risque);
    }
  });
}

// ---------- 7. ÉTIQUETTES FLOTTANTES (façon scan BIM) ----------
const labelAnchors = {
  fondations: new THREE.Vector3(W / 2 + 0.3, fondY, D / 2 + 0.3),
  murs_nord:  new THREE.Vector3(0, etageY, -D / 2),
  murs_sud:   new THREE.Vector3(0, etageY, D / 2),
  murs_est:   new THREE.Vector3(W / 2, rezY, 0),
  murs_ouest: new THREE.Vector3(-W / 2, rezY, 0),
  toiture:    new THREE.Vector3(0, ridgeY, 0),
  sous_sol:   new THREE.Vector3(-W / 2 - 0.3, -0.2, D / 2 + 0.3)
};
const labelOffsets = {
  fondations: new THREE.Vector3(1.8, 0.6, 1.8),
  murs_nord:  new THREE.Vector3(0, 1.6, -1.4),
  murs_sud:   new THREE.Vector3(0, 1.6, 1.4),
  murs_est:   new THREE.Vector3(2.4, 1.2, 0),
  murs_ouest: new THREE.Vector3(-2.4, 1.2, 0),
  toiture:    new THREE.Vector3(0, 1.6, 0),
  sous_sol:   new THREE.Vector3(-1.8, 0.3, 1.8)
};

const labelSprites = {};
const leaderLines = {};

function makeLabelCanvasTexture(title, score) {
  const canvas = document.createElement('canvas');
  canvas.width = 300; canvas.height = 90;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const color = '#' + scoreToColor(score).toString(16).padStart(6, '0');
  ctx.fillStyle = 'rgba(6,14,26,0.85)';
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  roundRect(ctx, 4, 4, canvas.width - 8, canvas.height - 8, 12);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#cfe8ff';
  ctx.font = '600 22px Segoe UI, sans-serif';
  ctx.fillText(title.replace('_', ' '), 20, 36);
  ctx.fillStyle = color;
  ctx.font = '700 26px Segoe UI, sans-serif';
  ctx.fillText(score + ' / 100', 20, 70);
  return new THREE.CanvasTexture(canvas);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

ZONE_NAMES.forEach(name => {
  const texture = makeLabelCanvasTexture(name, 0);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(material);
  const anchor = labelAnchors[name].clone().add(labelOffsets[name]);
  sprite.position.copy(anchor);
  sprite.scale.set(1.8, 0.55, 1);
  house.add(sprite);
  labelSprites[name] = sprite;

  const lineGeo = new THREE.BufferGeometry().setFromPoints([labelAnchors[name], anchor]);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: WIRE_COLOR, transparent: true, opacity: 0.5 }));
  house.add(line);
  leaderLines[name] = line;
});

function updateZoneLabel(zoneName, score) {
  const sprite = labelSprites[zoneName];
  if (!sprite) return;
  sprite.material.map = makeLabelCanvasTexture(zoneName, score);
  sprite.material.needsUpdate = true;
}

// ---------- 8. CONTRÔLE CAMÉRA MAISON (glisser = tourner, molette = zoom) ----------
const cameraTarget = new THREE.Vector3(0, 2.2, 0);
let radius = 15, theta = Math.PI / 4, phi = Math.PI / 3;
let targetTheta = theta, targetPhi = phi, targetRadius = radius;
let isDragging = false, lastX = 0, lastY = 0, idleTime = 0;

function updateCameraPosition(dt) {
  if (!isDragging) {
    idleTime += dt;
    if (idleTime > 2) targetTheta += dt * 0.06; // légère rotation auto quand on ne touche à rien
  }
  theta += (targetTheta - theta) * 0.1;
  phi += (targetPhi - phi) * 0.1;
  radius += (targetRadius - radius) * 0.1;
  camera.position.x = cameraTarget.x + radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = cameraTarget.y + radius * Math.cos(phi);
  camera.position.z = cameraTarget.z + radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(cameraTarget);
}

renderer.domElement.addEventListener('mousedown', (e) => { isDragging = true; idleTime = 0; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { isDragging = false; idleTime = 0; });
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  targetTheta -= dx * 0.006;
  targetPhi = Math.max(0.4, Math.min(Math.PI / 2.1, targetPhi - dy * 0.006));
});
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetRadius = Math.max(6, Math.min(28, targetRadius + e.deltaY * 0.01));
}, { passive: false });

// ---------- 9. RAYCASTING (survol + clic) ----------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredGroup = null;

function getIntersects(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(interactiveMeshes);
}

renderer.domElement.addEventListener('mousemove', (event) => {
  if (isDragging) return;
  const intersects = getIntersects(event);
  const newGroup = intersects.length ? intersects[0].object.parent : null;
  if (hoveredGroup && hoveredGroup !== newGroup) {
    hoveredGroup.scale.set(1, 1, 1);
    hoveredGroup = null;
    renderer.domElement.style.cursor = 'grab';
  }
  if (newGroup && newGroup !== hoveredGroup) {
    hoveredGroup = newGroup;
    hoveredGroup.scale.set(1.02, 1.02, 1.02);
    renderer.domElement.style.cursor = 'pointer';
  }
});

renderer.domElement.addEventListener('click', (event) => {
  const intersects = getIntersects(event);
  if (intersects.length) handleZoneClick(intersects[0].object.userData.zoneName);
});

window.MaisonAPI = {};
let currentDataset = MOCK_DATA.zones;

function handleZoneClick(zoneName) {
  if (typeof window.MaisonAPI.onZoneClick === 'function') {
    window.MaisonAPI.onZoneClick(zoneName, currentDataset[zoneName]);
  }
  showTestPanel(zoneName, currentDataset[zoneName]);
}

// ---------- 10. PANNEAU DE TEST (placeholder — Personne 3 fera la vraie UI) ----------
function showTestPanel(zoneName, data) {
  if (!data) return;
  const panel = document.getElementById('info-panel');
  document.getElementById('info-title').textContent = zoneName.replace('_', ' ');
  const badge = document.getElementById('info-badge');
  badge.textContent = `${data.niveau.toUpperCase()} — ${data.risque}/100`;
  badge.style.background = '#' + scoreToColor(data.risque).toString(16).padStart(6, '0');
  badge.style.color = '#04070c';
  document.getElementById('info-justif').textContent = data.justification;
  const recosDiv = document.getElementById('info-recos');
  recosDiv.innerHTML = '';
  (data.recommandations || []).forEach(r => {
    const el = document.createElement('div');
    el.className = 'reco';
    el.innerHTML = `<strong>${r.travaux}</strong><br>${r.cout_estime} · +${r.gain_resilience}% résilience`;
    recosDiv.appendChild(el);
  });
  panel.style.display = 'block';
}

// ---------- 11. TOGGLE 2025 / 2050 ----------
const btn2025 = document.getElementById('btn-2025');
const btn2050 = document.getElementById('btn-2050');
function applyDataset(dataset, scoreGlobal) {
  currentDataset = dataset;
  setZonesFromData(dataset);
  document.getElementById('score-value').textContent = scoreGlobal ?? '--';
}
btn2025.addEventListener('click', () => {
  btn2025.classList.add('active'); btn2050.classList.remove('active');
  applyDataset(MOCK_DATA.zones, MOCK_DATA.score_global);
});
btn2050.addEventListener('click', () => {
  btn2050.classList.add('active'); btn2025.classList.remove('active');
  applyDataset(MOCK_DATA.projection_2050.zones, MOCK_DATA.projection_2050.score_global);
});
applyDataset(MOCK_DATA.zones, MOCK_DATA.score_global);

// ---------- 12. API PUBLIQUE ----------
Object.assign(window.MaisonAPI, {
  updateZoneColor,
  setZonesFromData,
  onZoneClick: null,
  loadFullDataset(json) {
    if (!json || !json.zones) { console.error('MaisonAPI.loadFullDataset: JSON invalide', json); return; }
    currentDataset = json.zones;
    setZonesFromData(json.zones);
    document.getElementById('score-value').textContent = json.score_global ?? '--';
    window.MaisonAPI._dataset2050 = json.projection_2050;
  }
});

// ---------- 13. RESIZE ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- 14. BOUCLE DE RENDU ----------
let lastFrame = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastFrame) / 1000, 0.1);
  lastFrame = now;
  updateCameraPosition(dt);
  scanRing.material.opacity = 0.35 + Math.sin(now * 0.0015) * 0.15; // pulsation douce
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
